name: Sync branches (main ↔ mac-app-electron)

on:
  push:
    branches:
      - main
      - mac-app-electron

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main → mac-app-electron
        if: github.ref == 'refs/heads/main'
        run: |
          git checkout mac-app-electron
          git merge origin/main --no-edit
          git push origin mac-app-electron

      - name: Merge mac-app-electron → main
        if: github.ref == 'refs/heads/mac-app-electron'
        run: |
          git checkout main
          git merge origin/mac-app-electron --no-edit
          git push origin main
